networks:
  gamingpulse_net:
    driver: bridge

services:
  n8n:
    image: docker.io/n8nio/n8n:latest
    dns:
      - 1.1.1.1
      - 8.8.8.8
    container_name: gamingpulse-n8n
    restart: always
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - gamingpulse_net
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=Europe/Berlin
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - N8N_SECURE_COOKIE=false

  backend:
    build: ./backend
    container_name: gamingpulse-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - db_data:/app/data
    networks:
      - gamingpulse_net
    environment:
      - DB_PATH=/app/data/gamingpulse.db
      - GAMINGPULSE_N8N_URL=http://gamingpulse-n8n:5678
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
    depends_on:
      - n8n

  dashboard:
    build: ./dashboard
    container_name: gamingpulse-dashboard
    restart: always
    ports:
      - "3000:80"
    networks:
      - gamingpulse_net
    depends_on:
      - backend

volumes:
  n8n_data:
  db_data: