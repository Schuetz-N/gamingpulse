version: "3.8"

services:
  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: gamingpulse-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=Europe/Berlin
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
    depends_on:
      - ollama
      - backend

  ollama:
    image: docker.io/ollama/ollama:rocm
    container_name: gamingpulse-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - OLLAMA_FLASH_ATTENTION=1
      - HIP_VISIBLE_DEVICES=0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    group_add:
      - 39
      - 105
    security_opt:
      - seccomp=unconfined

  backend:
    build: ./backend
    container_name: gamingpulse-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/gamingpulse.db
      - OLLAMA_URL=http://ollama:11434
      - N8N_URL=http://n8n:5678
      - SPRING_PROFILES_ACTIVE=prod

  dashboard:
    build: ./dashboard
    container_name: gamingpulse-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  n8n_data:
  ollama_data:
  db_data:
