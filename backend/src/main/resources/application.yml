spring:
  application:
    name: gamingpulse-backend
  datasource:
    url: jdbc:sqlite:${DB_PATH:/app/data/gamingpulse.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

gamingpulse:
  n8n-url: ${GAMINGPULSE_N8N_URL:http://n8n:5678}
  groq-api-key: ${GROQ_API_KEY:}