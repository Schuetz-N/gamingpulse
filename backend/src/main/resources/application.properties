# Application
spring.application.name=gamingpulse-backend

# Datasource (SQLite)
# DB_PATH defaults to /app/data/gamingpulse.db if not set in .env
spring.datasource.url=jdbc:sqlite:${DB_PATH:/app/data/gamingpulse.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA
# ddl-auto=update lets Hibernate create/alter tables automatically on startup
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server
# Virtual threads (Project Loom) - requires Java 21+, improves I/O throughput
server.port=8080
spring.threads.virtual.enabled=true

# Actuator
# Only expose health and info endpoints - never expose env, beans or mappings
management.endpoints.web.exposure.include=health,info

# GamingPulse
# GAMINGPULSE_N8N_URL defaults to internal Docker network address
gamingpulse.n8n-url=${GAMINGPULSE_N8N_URL:http://n8n:5678}
# GROQ_API_KEY must be set in .env - used for health check and LLM requests
gamingpulse.groq-api-key=${GROQ_API_KEY:}
gamingpulse.groq-health-url=https://api.groq.com/openai/v1/models

# Security
# API_AUTH_TOKEN must be set in .env - shared secret between n8n and backend
api.auth.token=${API_AUTH_TOKEN}
# Suppress Spring Security's auto-generated password warning
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration