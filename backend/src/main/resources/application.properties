# ?? Application ???????????????????????????????????????????????????????????????
spring.application.name=gamingpulse-backend

# ?? Datasource (SQLite) ???????????????????????????????????????????????????????
spring.datasource.url=jdbc:sqlite:${DB_PATH:/app/data/gamingpulse.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info

# ?? GamingPulse ???????????????????????????????????????????????????????????????
gamingpulse.n8n-url=${GAMINGPULSE_N8N_URL:http://n8n:5678}
gamingpulse.groq-api-key=${GROQ_API_KEY:}

# ?? API Security ??????????????????????????????????????????????????????????????
api.auth.token=${API_AUTH_TOKEN}