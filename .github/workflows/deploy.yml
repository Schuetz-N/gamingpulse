name: Deploy GamingPulse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            cd /opt/gamingpulse

            # 1. Neuesten Code holen
            git pull origin main

            # 2. .env Datei schreiben
            cat > .env << 'ENVEOF'
            N8N_PASSWORD=${{ secrets.N8N_PASSWORD }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            ENVEOF
            chmod 600 .env

            # 3. Aggressives Cleanup (Verhindert "Port already in use")
            # Wir stoppen den alten Stack und killen hängende Port-Proxy-Prozesse
            podman-compose down || true
            killall -9 rootlessport conmon 2>/dev/null || true

            # 4. Build und Neustart
            # --build erzwingt das Neuerstellen der Images (Backend/Dashboard)
            podman-compose up -d --build

            # 5. Warten, bis die Container initialisiert sind
            # Java & n8n brauchen auf VPS oft etwas länger
            echo "Waiting for services to boot..."
            sleep 30

            # 6. Health checks (Lokal auf dem Server)
            BACKEND=$(curl -sf http://localhost:8080/api/status/health || echo '{"status":"failed"}')
            echo "Backend health: $BACKEND"

            N8N=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:5678 || echo "000")
            echo "n8n status: $N8N"

            DASH=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            echo "Dashboard status: $DASH"

            # 7. Validierung
            # Wir prüfen, ob das Backend "up" meldet
            if echo "$BACKEND" | grep -q "up"; then
              echo "✅ Deployment successful"
              podman image prune -f
            else
              echo "❌ Backend health check failed"
              podman-compose logs --tail 50
              exit 1
            fi
