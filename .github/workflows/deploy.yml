name: Deploy GamingPulse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            cd /opt/gamingpulse

            git pull origin main

            echo "N8N_PASSWORD=${{ secrets.N8N_PASSWORD }}" > .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
            echo "TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}" >> .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            chmod 600 .env

            podman-compose down || true
            sleep 3
            podman-compose up -d --build

            echo "Waiting for services..."
            sleep 45

            BACKEND=$(curl -sf http://localhost:8080/api/status/health || echo '{"status":"failed"}')
            echo "Backend health: $BACKEND"

            N8N_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:5678 || echo "000")
            echo "n8n HTTP status: $N8N_CODE"

            DASH_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            echo "Dashboard HTTP status: $DASH_CODE"

            if echo "$BACKEND" | grep -q '"ok"'; then
              echo "✅ Deployment successful"
              podman image prune -f
            else
              echo "❌ Backend health check failed"
              podman-compose logs --tail 50
              exit 1
            fi
