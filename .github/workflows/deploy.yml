name: Deploy GamingPulse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            cd /opt/gamingpulse

            git pull origin main

            echo "N8N_PASSWORD=${{ secrets.N8N_PASSWORD }}" > .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
            echo "TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}" >> .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            echo "API_AUTH_TOKEN=${{ secrets.API_AUTH_TOKEN }}" >> .env
            chmod 600 .env

            podman-compose down || true
            sleep 3
            podman-compose up -d --build

            echo "Waiting for initial boot..."
            sleep 30

            echo "--- Container status after boot ---"
            podman ps -a

            echo "Waiting for n8n to be internally ready..."
            for i in $(seq 1 36); do
              N8N_STATUS=$(podman exec gamingpulse-n8n node -e \
                "const h=require('http');h.get('http://localhost:5678/rest/settings',(r)=>{process.stdout.write(String(r.statusCode));process.exit(0);}).on('error',()=>{process.stdout.write('000');process.exit(0);})" \
                2>/dev/null || echo "000")
              echo "n8n status check $i/36: HTTP $N8N_STATUS"
              if [ "$N8N_STATUS" = "200" ]; then
                echo "n8n ready after ~$((i*5))s"
                break
              fi
              if [ "$i" = "36" ]; then
                echo "--- n8n logs ---"
                podman logs gamingpulse-n8n --tail 20
              fi
              sleep 5
            done

            echo "Waiting for backend health to stabilize..."
            for i in $(seq 1 24); do
              BACKEND=$(podman exec gamingpulse-n8n wget -qO- http://backend:8080/api/status/health 2>/dev/null || echo '{"status":"failed"}')
              echo "Backend health check $i/24: $BACKEND"
              if echo "$BACKEND" | grep -q '"up"'; then
                echo "Backend healthy after ~$((i*5))s"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "--- Backend logs ---"
                podman logs gamingpulse-backend --tail 30
              fi
              sleep 5
            done

            echo "--- Final container status ---"
            podman ps -a

            echo "Backend health: $BACKEND"

            DASH_CODE=$(podman exec gamingpulse-dashboard wget -qO- http://localhost:80 > /dev/null 2>&1 && echo "200" || echo "000")
            echo "Dashboard HTTP status: $DASH_CODE"

            if echo "$BACKEND" | grep -q '"up"'; then
              echo "✅ Deployment successful"
              podman image prune -f
            else
              echo "❌ Backend health check failed"
              podman-compose logs --tail 50
              exit 1
            fi