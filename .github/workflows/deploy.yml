name: Deploy GamingPulse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            cd /opt/gamingpulse

            # Neuesten Code holen
            git pull origin main

            # .env Datei aus GitHub Secrets schreiben
            cat > .env << 'ENVEOF'
            N8N_PASSWORD=${{ secrets.N8N_PASSWORD }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            ENVEOF
            chmod 600 .env

            # Build und Deployment mit sudo (wichtig für Rocky Linux)
            sudo podman-compose build
            sudo podman-compose down || true
            sudo podman-compose up -d

            # Warten, bis die Container oben sind
            echo "Waiting for services..."
            sleep 15

            # Health checks (Lokal auf dem Server)
            BACKEND=$(curl -sf http://localhost:8080/api/status/health || echo "FAILED")
            echo "Backend health: $BACKEND"

            N8N=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:5678 || echo "000")
            echo "n8n status: $N8N"

            DASH=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            echo "Dashboard status: $DASH"

            # Validierung des Deployments
            if echo "$BACKEND" | grep -q "up"; then
              echo "✅ Deployment successful"
              sudo podman image prune -f
            else
              echo "❌ Backend health check failed"
              sudo podman-compose logs --tail 20
              exit 1
            fi
